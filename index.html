<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1B4F8A">
<meta name="description" content="רשימת קניות משפחתית משותפת בזמן אמת">

<!-- PWA: iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="קניות">

<!-- PWA: iOS icons (inline SVG → data URI) -->
<link rel="apple-touch-icon" href="icon.png">

<!-- PWA: Splash screens iOS -->
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- PWA: Manifest (inline via data URI) -->
<link rel="manifest" href="manifest.json">

<title>🛍️ רשימת קניות משפחתית</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  :root {
    --bg:        #F8F9FC;
    --white:     #FFFFFF;
    --border:    #E8EAF0;
    --border2:   #D0D4E0;
    --text:      #1A1D2E;
    --text2:     #4A4F6A;
    --muted:     #9298B0;
    --radius:    18px;
    --shadow-sm: 0 1px 4px rgba(60,70,120,.06);
    --shadow:    0 4px 16px rgba(60,70,120,.10);
    --shadow-lg: 0 8px 32px rgba(60,70,120,.14);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    direction: rtl;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  input, button, select { font-family: 'Nunito', sans-serif; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  button { cursor: pointer; }
  button:disabled { opacity: .35; cursor: not-allowed; }

  /* ── App Shell ── */
  #app { max-width: 520px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }

  /* ── Header ── */
  #header {
    background: var(--white);
    padding: 18px 16px 16px;
    position: sticky; top: 0; z-index: 50;
    border-bottom: 1.5px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .header-title {
    font-size: 20px; font-weight: 900; color: var(--text);
    letter-spacing: -.3px;
  }
  .header-sub { color: var(--muted); font-size: 12px; font-weight: 700; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .hbtn {
    background: var(--bg);
    border: 1.5px solid var(--border);
    color: var(--text2);
    border-radius: 24px;
    height: 36px; padding: 0 14px;
    font-size: 13px; font-weight: 700;
    display: flex; align-items: center; gap: 5px;
    transition: background .15s, border-color .15s;
  }
  .hbtn:hover { background: var(--border); }

  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border2); flex-shrink: 0; transition: background .4s;
  }
  .sync-dot.live { background: #34d399; box-shadow: 0 0 6px #34d39988; }

  /* ── Accordion ── */
  #stores-list {
    display: flex; flex-direction: column; gap: 10px;
    padding: 14px 12px 28px; flex: 1;
  }

  .store-section {
    border-radius: var(--radius);
    background: var(--white);
    box-shadow: var(--shadow-sm);
    border: 1.5px solid var(--border);
    overflow: hidden;
    transition: box-shadow .25s ease, border-color .25s ease;
    will-change: box-shadow;
  }
  .store-section.open {
    box-shadow: var(--shadow-lg);
    border-color: var(--border2);
  }
  .store-section.store-dragging {
    opacity: .4; transform: scale(.98);
  }
  .store-section.store-drag-over {
    border-color: #1B4F8A !important;
    box-shadow: 0 0 0 2px #1B4F8A44;
  }
  .store-drag-handle {
    cursor: grab; color: rgba(255,255,255,.55);
    font-size: 14px; padding: 0 4px; flex-shrink: 0;
    display: flex; flex-direction: column; gap: 3px; align-items: center;
    touch-action: none;
  }
  .store-drag-handle:active { cursor: grabbing; }
  .store-drag-handle span { display: block; width: 16px; height: 2px; background: currentColor; border-radius: 2px; }

  .store-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    cursor: pointer; border: none; width: 100%; text-align: right;
    -webkit-user-select: none; user-select: none;
    min-height: 64px;
    background: var(--white);
    transition: background .15s;
  }
  .store-header:active { background: var(--bg); }

  /* Pastel left-border accent */
  .store-section .store-header { border-right: 5px solid transparent; }
  .store-section.open .store-header { background: var(--bg); }

  .store-header-emoji {
    font-size: 28px; flex-shrink: 0; line-height: 1;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  .store-section.open .store-header-emoji { transform: scale(1.15); }

  .store-header-info { flex: 1; text-align: right; }
  .store-header-name { font-size: 16px; font-weight: 800; color: var(--text); line-height: 1.2; }
  .store-header-count { font-size: 12px; font-weight: 600; color: var(--muted); margin-top: 1px; }

  .store-header-badge {
    color: #fff; border-radius: 20px;
    padding: 4px 11px; font-size: 12px; font-weight: 900; flex-shrink: 0;
  }
  .store-header-arrow {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg); border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--muted); flex-shrink: 0;
    transition: transform .35s cubic-bezier(.34,1.3,.64,1), background .2s, color .2s;
  }
  .store-section.open .store-header-arrow {
    transform: rotate(180deg);
    background: var(--text);
    border-color: var(--text);
    color: #fff;
  }

  /* ── Accordion body with smooth height animation ── */
  .store-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height .38s cubic-bezier(.4,0,.2,1);
  }
  .store-section.open .store-body { max-height: 2400px; }

  .store-body-inner {
    padding: 13px 13px 15px;
    border-top: 1.5px solid var(--border);
    opacity: 0;
    transform: translateY(-5px);
    transition: opacity .28s ease .06s, transform .28s ease .06s;
  }
  .store-section.open .store-body-inner {
    opacity: 1; transform: translateY(0);
  }

  /* ── Quick-Add ── */
  .quick-add {
    display: flex; gap: 8px; align-items: center;
    background: var(--bg); border-radius: 12px;
    padding: 10px 12px; margin-bottom: 12px;
    border: 2px solid var(--border);
    transition: border-color .15s, box-shadow .15s;
  }
  .quick-add:focus-within { border-color: var(--text2); box-shadow: 0 0 0 3px rgba(74,79,106,.08); }
  .quick-add input {
    flex: 1; border: none; background: transparent;
    font-size: 15px; font-weight: 700; outline: none;
    direction: rtl; color: var(--text); min-width: 0;
    font-family: 'Nunito', sans-serif;
  }
  .quick-add input::placeholder { color: var(--muted); font-weight: 600; }

  /* ── Buttons ── */
  .btn-primary {
    color: #fff; border: none; border-radius: 12px;
    padding: 9px 16px; font-size: 14px; font-weight: 800;
    white-space: nowrap;
    transition: transform .12s, box-shadow .12s;
  }
  .btn-primary:active { transform: scale(.95); }
  .btn-ghost {
    background: transparent; border: 2px solid;
    border-radius: 12px; padding: 7px 11px;
    font-size: 13px; font-weight: 700; white-space: nowrap;
    transition: background .12s;
  }
  .btn-secondary {
    background: var(--bg); color: var(--text2);
    border: 1.5px solid var(--border); border-radius: 12px;
    padding: 9px 16px; font-size: 14px; font-weight: 700;
    transition: background .12s;
  }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger {
    background: #fff5f5; color: #e53e3e;
    border: 1.5px solid #fed7d7; border-radius: 12px;
    padding: 9px 16px; font-size: 14px; font-weight: 700;
  }
  .btn-sm { padding: 5px 10px !important; font-size: 12px !important; }
  .btn-full { width: 100%; text-align: center; }
  button:disabled { opacity: .35; cursor: not-allowed; }

  /* ── Catalog Panel ── */
  .catalog-panel {
    background: var(--bg); border-radius: 12px;
    padding: 12px; margin-bottom: 12px;
    border: 1.5px solid var(--border);
    display: none;
  }
  .catalog-panel.open { display: block; }
  .catalog-search-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
  .catalog-search-row input {
    flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 7px 11px; font-size: 13px; outline: none;
    direction: rtl; color: var(--text); background: var(--white);
    font-family: 'Nunito', sans-serif; transition: border-color .15s;
  }
  .catalog-search-row input:focus { border-color: var(--text2); }
  .catalog-chips { max-height: 200px; overflow-y: auto; overflow-x: hidden; }
  .chip {
    border-radius: 20px; padding: 6px 13px;
    font-size: 13px; font-weight: 700;
    transition: background .12s, color .12s, transform .1s;
    white-space: nowrap; border: 1.5px solid;
  }
  .chip:active { transform: scale(.93); }

  /* ── Item List ── */
  .item-list { display: flex; flex-direction: column; gap: 7px; }

  .item-row {
    display: flex; align-items: center; gap: 11px;
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 11px 13px;
    min-height: 54px;
    -webkit-user-select: none; user-select: none;
    transition: border-color .15s, background .15s, opacity .25s, transform .15s;
  }
  .item-row:active { transform: scale(.985); background: var(--bg); }
  .item-row.done { opacity: .5; }

  .checkbox {
    width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0;
    border: 2.5px solid var(--border2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    background: var(--white);
    transition: all .22s cubic-bezier(.34,1.56,.64,1);
  }
  .checkbox:active { transform: scale(.82); }
  .checkbox.checked { border-color: transparent; }
  .checkbox svg { display: none; }
  .checkbox.checked svg { display: block; }

  .item-name {
    flex: 1; font-size: 15px; font-weight: 700; color: var(--text);
    cursor: pointer; line-height: 1.3;
    transition: color .2s;
  }
  .item-row.done .item-name { text-decoration: line-through; text-decoration-color: rgba(0,0,0,.25); color: var(--text2); font-weight: 600; opacity: .75; }

  .qty-badge {
    border: 1.5px solid; border-radius: 10px;
    padding: 4px 10px; font-size: 12px; font-weight: 800;
    white-space: nowrap; flex-shrink: 0; cursor: pointer;
  }
  .del-btn {
    background: none; border: none; color: var(--border2);
    font-size: 22px; padding: 0 2px; line-height: 1; flex-shrink: 0;
    transition: color .12s, transform .12s;
  }
  .del-btn:hover { color: #fc8181; transform: scale(1.2); }
  .del-btn:active { transform: scale(.9); }

  .done-header {
    display: flex; align-items: center; justify-content: space-between;
    margin: 14px 0 7px; padding: 0 2px;
  }
  .done-label { font-size: 11px; color: var(--muted); font-weight: 800; letter-spacing: .7px; text-transform: uppercase; }
  .clear-btn { background: none; border: none; font-size: 12px; color: var(--muted); font-weight: 800; padding: 3px 8px; border-radius: 8px; transition: color .12s, background .12s; }
  .clear-btn:hover { color: #e53e3e; background: #fff5f5; }

  .empty-state { text-align: center; padding: 28px 16px; color: var(--muted); }
  .empty-state .emoji { font-size: 40px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; font-weight: 700; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,29,46,.5);
    backdrop-filter: blur(6px);
    z-index: 200; display: flex; align-items: flex-end; justify-content: center;
    animation: fadeIn .2s ease;
  }
  @media (min-height: 600px) { .modal-overlay { align-items: center; padding: 12px; } }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal-box {
    background: var(--white); border-radius: 24px 24px 0 0;
    width: 100%; max-width: 480px; max-height: 92dvh; overflow-y: auto;
    direction: rtl; border: 1.5px solid var(--border);
    box-shadow: var(--shadow-lg);
    animation: slideUp .3s cubic-bezier(.34,1.2,.64,1);
  }
  @media (min-height: 600px) { .modal-box { border-radius: 24px; animation: popIn .25s cubic-bezier(.34,1.2,.64,1); } }
  @keyframes slideUp { from{transform:translateY(110%);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes popIn { from{opacity:0;transform:scale(.88) translateY(12px)} to{opacity:1;transform:scale(1) translateY(0)} }

  .modal-header {
    padding: 18px 18px 14px;
    border-bottom: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--white); z-index: 1;
    border-radius: 24px 24px 0 0;
  }
  .modal-title { font-size: 17px; font-weight: 900; color: var(--text); }
  .modal-close {
    background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px;
    width: 32px; height: 32px; font-size: 14px; color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    transition: background .12s;
  }
  .modal-close:hover { background: var(--border); }
  .modal-body { padding: 14px 18px 28px; }

  /* ── Qty Modal ── */
  .qty-row { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; }
  .qty-row input {
    flex: 1; border: 2px solid var(--border); border-radius: 12px;
    padding: 10px; font-size: 26px; font-weight: 900;
    text-align: center; outline: none; color: var(--text);
    background: var(--bg); font-family: 'Nunito', sans-serif;
    transition: border-color .15s;
  }
  .qty-row input:focus { border-color: var(--text2); }
  .qty-stepper {
    width: 44px; height: 44px; border: 2px solid var(--border); border-radius: 12px;
    font-size: 22px; font-weight: 900; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); color: var(--text);
    transition: background .12s; cursor: pointer;
  }
  .qty-stepper:active { background: var(--border); transform: scale(.9); }
  .unit-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }
  .unit-chip {
    border: 2px solid var(--border); border-radius: 20px; padding: 7px 15px;
    font-size: 13px; font-weight: 700; background: var(--white); color: var(--text2);
    cursor: pointer; transition: all .15s;
  }
  .unit-chip.active { background: var(--text); border-color: var(--text); color: #fff; }

  /* ── Manage Stores ── */
  .store-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg); border-radius: 13px;
    padding: 11px 13px; margin-bottom: 8px;
    border: 1.5px solid var(--border);
  }
  .store-row-actions { display: flex; gap: 5px; }
  .edit-form {
    background: var(--bg); border: 2px solid var(--border2);
    border-radius: 14px; padding: 14px; margin-top: 12px;
  }
  .edit-form-title { font-size: 13px; font-weight: 800; color: var(--text2); margin-bottom: 11px; }
  .form-group { margin-bottom: 11px; }
  .form-label { font-size: 11px; font-weight: 800; color: var(--muted); margin-bottom: 5px; display: block; letter-spacing: .5px; text-transform: uppercase; }
  .form-input {
    width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 9px 12px; font-size: 14px; outline: none;
    direction: rtl; color: var(--text); background: var(--white);
    font-family: 'Nunito', sans-serif; transition: border-color .15s;
  }
  .form-input:focus { border-color: var(--text2); }
  .emoji-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .emoji-option {
    font-size: 20px; background: var(--white); border: 2.5px solid transparent;
    border-radius: 9px; padding: 4px 6px; cursor: pointer;
    transition: border-color .12s, background .12s;
  }
  .emoji-option.selected { background: var(--bg); border-color: var(--text2); }
  .color-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .color-option {
    width: 28px; height: 28px; border-radius: 50%;
    border: 3px solid transparent; cursor: pointer;
    transition: transform .15s;
  }
  .color-option:hover { transform: scale(1.15); }
  .color-option.selected { border-color: var(--text); transform: scale(1.15); }
  .add-store-btn {
    width: 100%; background: transparent;
    border: 2px dashed var(--border2); border-radius: 13px;
    padding: 12px; margin-top: 8px;
    font-size: 13px; font-weight: 700; color: var(--muted);
    font-family: 'Nunito', sans-serif; transition: all .15s;
  }
  .add-store-btn:hover { border-color: var(--text2); color: var(--text2); }

  /* ── History ── */
  .history-filters { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
  .filter-btn {
    border: 2px solid var(--border); border-radius: 20px; padding: 6px 14px;
    font-size: 13px; font-weight: 700; background: var(--white); color: var(--text2);
    cursor: pointer; transition: all .15s;
  }
  .filter-btn.active { background: var(--text); border-color: var(--text); color: #fff; }
  .history-item {
    display: flex; align-items: center; gap: 9px;
    background: var(--bg); border-radius: 12px;
    padding: 10px 13px; margin-bottom: 6px;
    border: 1.5px solid var(--border);
  }
  .history-name { flex: 1; font-size: 14px; font-weight: 700; color: var(--text); }
  .history-qty { font-size: 12px; font-weight: 800; border-radius: 8px; padding: 3px 8px; }
  .history-date { font-size: 11px; color: var(--muted); font-weight: 700; white-space: nowrap; }

  /* ── Toast ── */
  /* ── In-app notification banner ── */
  #notif-banner {
    position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
    pointer-events: none;
    display: flex; flex-direction: column; align-items: center;
    gap: 6px; padding-top: 8px;
  }
  .notif-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--text); color: #fff;
    padding: 11px 18px; border-radius: 16px;
    font-size: 13px; font-weight: 700;
    box-shadow: 0 4px 20px rgba(0,0,0,.22);
    max-width: 320px; width: calc(100% - 32px);
    opacity: 0; transform: translateY(-16px);
    transition: opacity .25s, transform .25s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
  }
  .notif-item.show { opacity: 1; transform: translateY(0); }
  .notif-item.hide { opacity: 0; transform: translateY(-8px); }
  .notif-icon { font-size: 18px; flex-shrink: 0; }

  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--text); color: #fff;
    padding: 12px 22px; border-radius: 28px;
    font-size: 14px; font-weight: 800;
    z-index: 1000; opacity: 0;
    transition: opacity .22s, transform .22s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none; white-space: nowrap;
    box-shadow: var(--shadow-lg);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Footer ── */
  #footer {
    text-align: center; padding: 10px 16px 8px;
    color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: .3px;
  }
  #presence-bar {
    display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
    gap: 6px; padding: 6px 16px 20px;
  }
  .presence-chip {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 20px; padding: 4px 10px 4px 8px;
    font-size: 12px; font-weight: 700; color: var(--text2);
  }
  .presence-dot {
    width: 7px; height: 7px; border-radius: 50%; background: #48bb78; flex-shrink: 0;
    box-shadow: 0 0 0 2px #48bb7840;
  }
  .presence-dot.away { background: #e2e8f0; box-shadow: none; }

  /* ── Category groups ── */
  .cat-group-header {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 2px 4px;
    font-size: 11px; font-weight: 800; color: var(--muted);
    letter-spacing: .5px; text-transform: uppercase;
    margin-top: 4px;
  }
  .cat-group-header:first-child { margin-top: 0; padding-top: 2px; }
  .cat-group-header span { opacity: .7; }
  .cat-chips-group { margin-bottom: 10px; }
  .cat-chips-group-title {
    font-size: 11px; font-weight: 800; color: var(--muted);
    margin-bottom: 5px; letter-spacing: .4px;
  }

function activeStore() { return STATE.stores.find(s=>s.id===activeStoreId)||STATE.stores[0]; }
function toArray(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val;
  // Firebase converts arrays to objects with numeric keys
  return Object.values(val);
}
function activeItems() { return toArray((STATE.lists[activeStoreId]||{}).items); }

function addItem(name) {
  const sid = activeStoreId;
  const items = activeItems();
  if (items.find(i=>i.name===name)) { toast('כבר ברשימה ✓'); return; }
  const newItem = { id: 'i'+Date.now(), name, done: false };
  listsRef.child(sid).child('items').set([...items, newItem]);
}

function toggleItem(id, storeId) {
  const sid   = storeId || activeStoreId;
  const items = toArray((STATE.lists[sid]||{}).items);
  const item  = items.find(i=>i.id===id);
  if (!item) return;

  vibrate(item.done ? 15 : 35);

  if (!item.done) {
    const hEntry = { name: item.name, storeId: sid, at: Date.now() };
    if (item.qty)  hEntry.qty  = item.qty;
    if (item.unit) hEntry.unit = item.unit;
    if (MY_NAME)   hEntry.by   = MY_NAME;
    historyRef.push(hEntry);
  }
  listsRef.child(sid).child('items').set(items.map(i=> i.id===id ? {...i, done:!i.done} : i));
}

function removeItem(id, storeId) {
  const sid = storeId || activeStoreId;
  listsRef.child(sid).child('items').set(toArray((STATE.lists[sid]||{}).items).filter(i=>i.id!==id));
}

function clearDone() {
  listsRef.child(activeStoreId).child('items').set(toArray((STATE.lists[activeStoreId]||{}).items).filter(i=>!i.done));
  closeModal();
}

function updateQty(id, qty, unit, storeId) {
  const sid = storeId || activeStoreId;
  listsRef.child(sid).child('items').set(toArray((STATE.lists[sid]||{}).items).map(i=> i.id===id ? {...i, qty, unit} : i));

function toggleSection(storeId) {
  const sec  = document.getElementById('sec-'+storeId);
  const body = document.getElementById('body-'+storeId);
  if (!sec) return;

  if (openStores.has(storeId)) {
    openStores.delete(storeId);
    openCatalogs.delete(storeId);
    sec.classList.remove('open');
  } else {
    openStores.add(storeId);
    // catalog stays closed by default
    sec.classList.add('open');
    activeStoreId = storeId;
    // Lazy-render body content
    if (body && !body.innerHTML.trim()) {
      const store = STATE.stores.find(s=>s.id===storeId);
      const items = toArray((STATE.lists[storeId]||{}).items);
      if (store) body.innerHTML = renderStoreBody(store, items);
    }
    setTimeout(() => _applyCatalogState(storeId), 50);
  }
}

function parseImportText(text) {
  return text.split('\n')
    .map(l => l
      .replace(/^[-•*✓✗→>\d.]+\s*/, '')  // remove bullets/numbers
      .replace(/\s*[x×]\s*\d+.*$/i, '')    // remove "x2", "×3" at end
      .replace(/\s*\d+\s*(יח|ק"ג|קג|גרם|ליטר|מ"ל|יחידות|כוס|כפית|כף|אריזה|חבילה).*$/i, '') // remove qty
      .trim()
    )
    .filter(l => l.length > 1 && l.length < 50);
}

window.doImport = (sid) => {
  const text = document.getElementById('import-text')?.value || '';
  const names = parseImportText(text);
  if (!names.length) { toast('לא זוהו מוצרים'); return; }
  const existing = new Set(toArray((STATE.lists[sid]||{}).items).map(i=>i.name));
  const toAdd = names.filter(n => !existing.has(n));
  if (!toAdd.length) { toast('כל המוצרים כבר ברשימה'); closeModal(); return; }
  // Add all at once
  const items = toArray((STATE.lists[sid]||{}).items);
  const newItems = toAdd.map(name => {
    const item = { id:'i'+Date.now()+Math.random(), name, done:false, category: guessCategory(name) };
    if (MY_NAME) item.addedBy = MY_NAME;
    return item;
  });
  listsRef.child(sid).child('items').set([...items, ...newItems]);
  closeModal();
  toast('יובאו ' + toAdd.length + ' מוצרים ✓');
};

function addItemTo(storeId, name, category) {
  if (!name?.trim()) return;
  const items = toArray((STATE.lists[storeId]||{}).items);
  if (items.find(i=>i.name===name.trim())) { toast('כבר ברשימה ✓'); return; }
  const cat = category || getCatalogCategory(storeId, name.trim()) || guessCategory(name.trim());
  const newItem = { id:'i'+Date.now(), name:name.trim(), done:false, category:cat };
  if (MY_NAME) newItem.addedBy = MY_NAME;
  vibrate(20);
  listsRef.child(storeId).child('items').set([...items, newItem]);
}

function getCatalogCategory(storeId, name) {
  const store = STATE.stores.find(s=>s.id===storeId);
  return store?.catalogCategories?.[name] || null;
}

function clearDoneFor(storeId) {
  const items = toArray((STATE.lists[storeId]||{}).items).filter(i=>!i.done);
  listsRef.child(storeId).child('items').set(items);
}

// Track catalog open state in memory (not DOM) so refreshBody never loses it
const openCatalogs = new Set();

function unifiedAdd(sid) {
  const inp = document.getElementById('qi-'+sid);
  if (!inp) return;
  const val = inp.value.trim();
  if (!val) return;

  const store = STATE.stores.find(s=>s.id===sid);

  // Auto-add to catalog if not already there
  if (store && !(store.catalog||[]).includes(val)) {
    store.catalog = [...(store.catalog||[]), val];
    // Save just this store's catalog directly by index
    const idx = STATE.stores.findIndex(s=>s.id===sid);
    if (idx >= 0) storesRef.child(String(idx)).child('catalog').set(store.catalog);
  }

  addItemTo(sid, val);

  // Clear input, keep focus
  inp.value = '';
  inp.focus();
  window['catQ_'+sid] = '';

  // Refresh chips — preserve scroll position
  if (!store) return;
  const items = toArray((STATE.lists[sid]||{}).items);
  const names = new Set(items.map(i=>i.name));
  const c = store.color;
  const chips = (store.catalog||[]).filter(p=>!names.has(p) && p !== val);
  const chipsContainer = document.querySelector(`#cat-panel-${sid} .catalog-chips`);
  if (chipsContainer) {
    const scrollTop = chipsContainer.scrollTop;
    chipsContainer.innerHTML = renderCatalogChipsGrouped(chips, sid, c, c+'14', c+'2a', store);
    chipsContainer.scrollTop = scrollTop;
  }
}

function filterCatalogChips(sid, query) {
  // Save query in memory
  window['catQ_'+sid] = query;

  const store  = STATE.stores.find(s=>s.id===sid);
  if (!store) return;
  const items  = toArray((STATE.lists[sid]||{}).items);
  const names  = new Set(items.map(i=>i.name));
  const c      = store.color;
  const lightBg    = c+'14';
  const lightBorder = c+'2a';
  const catalog = store.catalog || [];
  const chips  = catalog.filter(p => p.includes(query) && !names.has(p));

  // Only replace the chips container, not the whole body
  const chipsContainer = document.querySelector(`#cat-panel-${sid} .catalog-chips`);
  if (!chipsContainer) return;

  chipsContainer.innerHTML = renderCatalogChipsGrouped(chips, sid, c, lightBg, lightBorder, store);
}

function openCatalog(sid) {
  if (openCatalogs.has(sid)) return; // already open
  openCatalogs.add(sid);
  // Render chips fresh
  const store = STATE.stores.find(s=>s.id===sid);
  if (store) {
    const items = toArray((STATE.lists[sid]||{}).items);
    const names = new Set(items.map(i=>i.name));
    const c     = store.color;
    const query = window["catQ_"+sid] || "";
    const chips = (store.catalog||[]).filter(p=>p.includes(query) && !names.has(p));
    const box   = document.querySelector("#cat-panel-"+sid+" .catalog-chips");
    if (box) box.innerHTML = renderCatalogChipsGrouped(chips, sid, c, c+"14", c+"2a", store);
  }
  _applyCatalogState(sid);
}

function toggleCatalogFor(sid) {
  if (openCatalogs.has(sid)) {
    openCatalogs.delete(sid);
    _applyCatalogState(sid);
  } else {
    openCatalogs.add(sid);
    // Re-render chips with fresh data when opening
    const store = STATE.stores.find(s=>s.id===sid);
    if (store) {
      const items  = toArray((STATE.lists[sid]||{}).items);
      const names  = new Set(items.map(i=>i.name));
      const c      = store.color;
      const query  = window["catQ_"+sid] || "";
      const chips  = (store.catalog||[]).filter(p=>p.includes(query) && !names.has(p));
      const container = document.querySelector("#cat-panel-"+sid+" .catalog-chips");
      if (container) container.innerHTML = renderCatalogChipsGrouped(chips, sid, c, c+"14", c+"2a", store);
    }
    _applyCatalogState(sid);
  }
}

function _applyCatalogState(sid) {
  const isOpen = openCatalogs.has(sid);
  const panel  = document.getElementById('cat-panel-'+sid);
  const btn    = document.getElementById('cat-tog-'+sid);
  if (panel) panel.classList.toggle('open', isOpen);
  if (btn)   btn.innerHTML = `רשימה ${isOpen ? '▲' : '▼'}`;
}

function toggleSuggest(sid) {
  const chips = document.getElementById('ss-chips-'+sid);
  const tog   = document.getElementById('ss-tog-'+sid);
  if (!chips) return;
  const nowHidden = chips.classList.toggle('ss-hidden');
  window['ssOpen_'+sid] = !nowHidden;
  if (tog) tog.textContent = nowHidden ? 'הצג ▼' : 'הסתר ▲';
}

function refreshBody(sid) {
  const store = STATE.stores.find(s=>s.id===sid);
  const items = toArray((STATE.lists[sid]||{}).items);
  const body  = document.getElementById('body-'+sid);
  if (!store || !body) return;
  // Save catalog scroll position before re-render
  const oldChips = body.querySelector('.catalog-chips');
  const savedScroll = oldChips ? oldChips.scrollTop : 0;
  body.innerHTML = renderStoreBody(store, items);
  // Restore catalog state + scroll
  _applyCatalogState(sid);
  if (savedScroll > 0) {
    const newChips = body.querySelector('.catalog-chips');
    if (newChips) newChips.scrollTop = savedScroll;
  }
}


function renderCatalogChipsGrouped(chips, sid, c, lightBg, lightBorder, store) {
  if (!chips.length) return `<span style="color:#bbb;font-size:13px">הכל ברשימה ✓</span>`;
  // Group chips by their catalog category or guessed category
  const groups = {};
  const ORDER = Object.keys(CATEGORY_KEYWORDS);
  for (const p of chips) {
    const cat = getCatalogCategory(sid, p) || guessCategory(p);
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(p);
  }
  const sortedCats = Object.keys(groups).sort((a,b)=>{
    const ai=ORDER.indexOf(a),bi=ORDER.indexOf(b);
    if(ai===-1&&bi===-1)return a.localeCompare(b,'he');
    if(ai===-1)return 1; if(bi===-1)return -1; return ai-bi;
  });
  // If only one group, show flat
  if (sortedCats.length <= 1) {
    return chips.map(p=>`<button class="chip"
      style="background:${lightBg};color:${c};border:1.5px solid ${lightBorder};margin:2px"
      onclick="addItemTo('${sid}','${escAttr(p)}')"
      onmouseenter="this.style.background='${c}';this.style.color='#fff'"
      onmouseleave="this.style.background='${lightBg}';this.style.color='${c}'">+ ${escHtml(p)}</button>`).join('');
  }
  let h = '';
  for (const cat of sortedCats) {
    const emoji = cat.split(' ')[0];
    const label = cat.substring(emoji.length).trim();
    h += `<div class="cat-chips-group">
      <div class="cat-chips-group-title">${emoji} ${escHtml(label)}</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${groups[cat].map(p=>`<button class="chip"
          style="background:${lightBg};color:${c};border:1.5px solid ${lightBorder}"
          onclick="addItemTo('${sid}','${escAttr(p)}')"
          onmouseenter="this.style.background='${c}';this.style.color='#fff'"
          onmouseleave="this.style.background='${lightBg}';this.style.color='${c}'">+ ${escHtml(p)}</button>`).join('')}
      </div>
    </div>`;
  }
  return h;
}

let modalStack = [];

  const root = document.getElementById('modal-root');

  root.innerHTML = `
  <div class="modal-overlay" id="${id}" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">

        <button class="modal-close" onclick="closeModal()">✕</button>

function closeModal() {

function openQtyEditor(itemId) {

  openModal(`
  <div class="qty-row">
    <button class="qty-stepper btn-secondary" onclick="qtyStep(-1)">−</button>
    <input type="number" id="qty-val" value="${qty}" min="1"
      style="border:1.5px solid #e0d9ce;border-radius:10px;padding:8px;font-size:22px;font-weight:800;text-align:center;outline:none;flex:1;color:#1a1209">
    <button class="qty-stepper" style="background:${c};color:#fff;border:none;border-radius:9px;width:38px;height:38px;font-size:20px;font-weight:700;flex-shrink:0" onclick="qtyStep(1)">+</button>
  </div>
  <div class="unit-chips">
    ${UNITS.map(u=>`
      <button class="unit-chip" id="unit-${u.replace(/['"]/g,'')}"
        style="background:${unit===u?c:'#f0ece4'};color:${unit===u?'#fff':'#5a4e3a'};border:none;border-radius:18px;padding:6px 13px;font-size:13px;font-weight:600"

  </div>

    <button class="btn-secondary" onclick="closeModal()">ביטול</button>

}

function qtyStep(d) {
  const inp = document.getElementById('qty-val');
  if (inp) inp.value = Math.max(1, parseInt(inp.value)||1) + d;
}

let _selectedUnit = null;
function selectUnit(u, c) {
  _selectedUnit = u;
  document.querySelectorAll('.unit-chip').forEach(el => {
    const isThis = el.textContent.trim() === u;
    el.style.background = isThis ? c : '#f0ece4';
    el.style.color = isThis ? '#fff' : '#5a4e3a';
  });
}
function saveQty(itemId) {
  const inp = document.getElementById('qty-val');
  const qty = Math.max(1, parseInt(inp?.value)||1);
  const unit = _selectedUnit || document.querySelector('.unit-chip[style*="color: rgb"]')?.textContent.trim() || "יח'";
  updateQty(itemId, qty, unit, activeStoreId);
  closeModal();
  _selectedUnit = null;
}

// ── History ──
function openHistory() {
  let filterStore = 'all';

  const renderHistoryBody = () => {
    const hist   = [...STATE.history].sort((a,b)=>(b.at||0)-(a.at||0));
    const filter = filterStore;
    const shown  = filter==='all' ? hist : hist.filter(h=>h.storeId===filter);

    const filters = `<div class="history-filters">
      <button class="filter-btn" style="background:${filterStore==='all'?'#1a1209':'#f0ece4'};color:${filterStore==='all'?'#fff':'#5a4e3a'}"
        onclick="histFilter('all')">הכל</button>
      ${STATE.stores.map(s=>`
        <button class="filter-btn"
          style="background:${filter===s.id?s.color:'#f0ece4'};color:${filter===s.id?'#fff':'#5a4e3a'}"
          onclick="histFilter('${s.id}')">${s.emoji} ${escHtml(s.name)}</button>`).join('')}
    </div>`;

    const items = shown.slice(0,150).map(h=>{
      const store = STATE.stores.find(s=>s.id===h.storeId);
      const d = new Date(h.at);
      const dateStr = d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit'})
                    + ' ' + d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
      const alreadyInList = toArray((STATE.lists[h.storeId]||{}).items)
        .some(i => i.name === h.name && !i.done);
      const addBtn = alreadyInList
        ? `<span style="font-size:11px;color:var(--muted);font-weight:700;padding:4px 8px">✓ ברשימה</span>`
        : `<button onclick="histReAdd('${escAttr(h.name)}','${h.storeId}')"
             style="border:1.5px solid ${store?.color||'#888'};color:${store?.color||'#888'};
                    background:${store?.color||'#888'}10;border-radius:10px;
                    padding:5px 10px;font-size:12px;font-weight:800;white-space:nowrap;
                    font-family:inherit;cursor:pointer">+ הוסף</button>`;
      return `<div class="history-item">
        <span>${store?.emoji||'🛍️'}</span>
        <div style="flex:1;min-width:0">
          <div class="history-name">${escHtml(h.name)}</div>
          ${h.by?`<div style="font-size:10px;color:var(--muted);font-weight:700;margin-top:1px">✓ ${escHtml(h.by)}</div>`:''}
        </div>
        ${h.qty?`<span class="history-qty" style="background:${store?.color||'#888'}18;color:${store?.color||'#888'}">${h.qty} ${h.unit||''}</span>`:''}
        ${addBtn}
      </div>`;
    }).join('');

    const clearBtn = STATE.history.length > 0 ? `
      <div style="text-align:center;margin-top:16px;padding-bottom:4px">
        <button onclick="confirmClearHistory()"
          style="background:none;border:1.5px solid #fca5a5;color:#e53e3e;border-radius:10px;
                 padding:8px 16px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer">
          🗑 אפס היסטוריה והצעות חכמות
        </button>
      </div>` : '';

    return filters + (shown.length===0
      ? `<div style="text-align:center;padding:24px 0;color:#bbb;font-size:14px">אין היסטוריה עדיין</div>${clearBtn}`
      : `<div>${items}</div>${clearBtn}`);
  };

  window.confirmClearHistory = () => {
    if (!confirm('למחוק את כל ההיסטוריה?\nההצעות החכמות יתאפסו גם כן.')) return;
    historyRef.remove();
    toast('היסטוריה נמחקה ✓');
    closeModal();
  };

  window.histFilter = (id) => {
    filterStore = id;
    const body = document.querySelector('.modal-body');
    if (body) body.innerHTML = renderHistoryBody();
  };
  window.histReAdd = (name, storeId) => {
    addItemTo(storeId, name);
    toast('נוסף לרשימה ✓');
    // Re-render history modal to update button state
    const body = document.querySelector('.modal-body');
    if (body) setTimeout(() => { body.innerHTML = renderHistoryBody(); }, 350);
  };

  openModal(renderHistoryBody(), '📋 היסטוריית קניות');
}

window.storeEdit = (id) => {
  const s = STATE.stores.find(x=>x.id===id);
  if (!s) return;
  _editingStoreId = id;
  _editForm = { name:s.name, emoji:s.emoji, color:s.color };
  renderManageStores();
};
window.storeNew = () => {
  _editingStoreId = 'new';
  _editForm = { name:'', emoji:'🛍️', color:'#374151' };
  renderManageStores();
};
window.storeCancelEdit = () => { _editingStoreId=null; renderManageStores(); };
window.efSetEmoji = (e) => { _editForm.emoji=e; renderManageStores(); };
window.efSetColor = (c) => { _editForm.color=c; renderManageStores(); };
window.storeMove = (i, dir) => {
  const stores = [...STATE.stores];
  const j = i+dir;
  if (j<0||j>=stores.length) return;
  [stores[i],stores[j]]=[stores[j],stores[i]];
  saveStores(stores);
};
window.storeDelete = (id) => {
  if (STATE.stores.length<=1) return;
  saveStores(STATE.stores.filter(s=>s.id!==id));
  if (activeStoreId===id) activeStoreId=STATE.stores[0]?.id;
  renderManageStores();
};
window.storeSave = () => {
  const f = _editForm;
  if (!f.name?.trim()) { toast('הזן שם לחנות'); return; }
  let stores;
  if (_editingStoreId==='new') {
    stores = [...STATE.stores, { id:'s_'+Date.now(), name:f.name.trim(), emoji:f.emoji, color:f.color, catalog:[] }];
  } else {
    stores = STATE.stores.map(s=> s.id===_editingStoreId ? {...s, name:f.name.trim(), emoji:f.emoji, color:f.color} : s);
  }
  saveStores(stores);
  _editingStoreId=null;
  renderManageStores();
};

function openManageCatalog(storeId) {
  const store = STATE.stores.find(s=>s.id===storeId);
  if (!store) return;
  let catalog = [...(store.catalog||[])];
  let catCategories = Object.assign({}, store.catalogCategories||{});
  let catInput = '';

  const ORDER = Object.keys(CATEGORY_KEYWORDS);

  const renderCatalogItems = () => {
    if (!catalog.length) return `<div style="color:#bbb;font-size:13px;padding:8px 0">המאגר ריק</div>`;
    // Group by category
    const groups = {};
    for (const item of catalog) {
      const cat = catCategories[item] || guessCategory(item);
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(item);
    }
    const sortedCats = Object.keys(groups).sort((a,b)=>{
      const ai=ORDER.indexOf(a),bi=ORDER.indexOf(b);
      if(ai===-1&&bi===-1)return 0; if(ai===-1)return 1; if(bi===-1)return -1; return ai-bi;
    });
    return sortedCats.map(cat => {
      const emoji = cat.split(' ')[0];
      const label = cat.substring(emoji.length).trim();
      return `<div style="margin-bottom:10px">
        <div style="font-size:11px;font-weight:800;color:var(--muted);margin-bottom:5px;letter-spacing:.4px">${emoji} ${escHtml(label)}</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">
          ${groups[cat].map(item=>`
            <div style="display:flex;align-items:center;gap:3px;background:${store.color}15;border:1.5px solid ${store.color}2a;border-radius:18px;padding:3px 6px 3px 9px;cursor:pointer"
              onclick="catEditItem('${escAttr(item)}')" title="לחץ לשינוי קטגוריה">
              <span style="font-size:12px;font-weight:700;color:${store.color}">${escHtml(item)}</span>
              <button onclick="event.stopPropagation();catRemove('${escAttr(item)}')" style="background:none;border:none;cursor:pointer;color:${store.color}77;font-size:13px;padding:0 0 0 2px;line-height:1">×</button>
            </div>`).join('')}
        </div>
      </div>`;
    }).join('');
  };

  const render = () => {
    const catOptions = ORDER.map(cat =>
      `<option value="${escAttr(cat)}">${cat}</option>`
    ).join('');

    openModal(`
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input type="text" id="cat-input" value="${escHtml(catInput)}"
        placeholder="הוסף מוצר למאגר..."
        style="flex:1;border:1.5px solid var(--border);border-radius:10px;padding:8px 11px;font-size:14px;outline:none;direction:rtl;color:var(--text);background:var(--bg);font-family:inherit"
        oninput="catInput=this.value"
        onkeydown="if(event.key==='Enter'){catAdd()}">
      <button class="btn-primary" style="background:${store.color}" onclick="catAdd()">הוסף</button>
    </div>
    <div style="max-height:320px;overflow-y:auto;margin-bottom:14px">
      ${renderCatalogItems()}
    </div>
    <div id="cat-edit-panel" style="display:none;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:800;color:var(--muted);margin-bottom:8px">שנה קטגוריה ל: <strong id="cat-edit-name"></strong></div>
      <select id="cat-edit-select" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:8px;font-size:14px;font-family:inherit;direction:rtl;background:var(--white)">
        ${catOptions}
      </select>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn-primary" style="background:${store.color}" onclick="catSaveCat()">✓ שמור</button>
        <button class="btn-secondary" onclick="document.getElementById('cat-edit-panel').style.display='none'">ביטול</button>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-primary btn-full" style="background:${store.color}" onclick="catSave()">✓ שמור מאגר</button>
      <button class="btn-secondary" onclick="closeModal()">סגור</button>
    </div>`, `${store.emoji} מאגר — ${escHtml(store.name)}`);
    const ci = document.getElementById('cat-input');
    if (ci) ci.focus();
  };

  window.catInput = '';
  window._catEditItem = null;

  window.catAdd = () => {
    const t = (document.getElementById('cat-input')?.value||'').trim();
    if (!t||catalog.includes(t)) return;
    catalog.push(t);
    // Auto-assign category
    catCategories[t] = guessCategory(t);
    window.catInput='';
    render();
  };

  window.catEditItem = (item) => {
    window._catEditItem = item;
    const panel = document.getElementById('cat-edit-panel');
    const nameEl = document.getElementById('cat-edit-name');
    const sel = document.getElementById('cat-edit-select');
    if (!panel) return;
    panel.style.display = 'block';
    if (nameEl) nameEl.textContent = item;
    const currentCat = catCategories[item] || guessCategory(item);
    if (sel) sel.value = currentCat;
  };

  window.catSaveCat = () => {
    const item = window._catEditItem;
    const sel = document.getElementById('cat-edit-select');
    if (!item || !sel) return;
    catCategories[item] = sel.value;
    document.getElementById('cat-edit-panel').style.display = 'none';
    render();
  };

  window.catRemove = (item) => {
    catalog = catalog.filter(i=>i!==item);
    delete catCategories[item];
    render();
  };

  window.catSave = () => {
    const store = STATE.stores.find(s=>s.id===storeId);
    const stores = STATE.stores.map(s => s.id===storeId
      ? {...s, catalog, catalogCategories: catCategories}
      : s);
    storesRef.set(stores);
    closeModal();
    toast('המאגר עודכן ✓');
  };

  render();
}

// ══════════════════════════════════════════════════════════════
//  SMART HISTORY SUGGESTIONS
// ══════════════════════════════════════════════════════════════
function getSmartSuggestions(storeId, currentItems) {
  if (STATE.history.length < 5) return [];
  const currentNames = new Set(currentItems.map(i=>i.name));
  const storeHistory = STATE.history.filter(h=>h.storeId===storeId);
  if (storeHistory.length < 3) return [];

  // Group purchases by session (within 2 hours of each other)
  const sessions = [];
  const sorted = [...storeHistory].sort((a,b)=>a.at-b.at);
  let session = [sorted[0]];
  for (let i=1;i<sorted.length;i++) {
    if (sorted[i].at - sorted[i-1].at < 7200000) session.push(sorted[i]);
    else { sessions.push(session); session=[sorted[i]]; }
  }
  sessions.push(session);

  // Count co-occurrence with items currently in list
  const score = {};
  for (const sess of sessions) {
    const names = sess.map(i=>i.name);
    const overlap = names.filter(n=>currentNames.has(n));
    if (overlap.length === 0) continue;
    for (const name of names) {
      if (!currentNames.has(name)) {
        score[name] = (score[name]||0) + overlap.length;
      }
    }
  }

  // Also suggest items not in list that appear frequently
  const freq = {};
  for (const h of storeHistory) {
    if (!currentNames.has(h.name)) freq[h.name] = (freq[h.name]||0) + 1;
  }

  // Merge: weight co-occurrence more
  const combined = {};
  for (const [k,v] of Object.entries(score)) combined[k] = (combined[k]||0) + v*3;
  for (const [k,v] of Object.entries(freq)) {
    if (v >= 2) combined[k] = (combined[k]||0) + v;
  }

  // Only suggest items that exist in the store's catalog
  const store = STATE.stores.find(s=>s.id===storeId);
  const catalogSet = new Set(store?.catalog || []);

  return Object.entries(combined)
    .filter(([name]) => catalogSet.has(name))
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5)
    .map(([name])=>name);
}

//  RECURRING ITEMS
// ══════════════════════════════════════════════════════════════
function getDueRecurring(storeId, currentItems) {
  const now = Date.now();
  const currentNames = new Set(currentItems.map(i=>i.name));
  return STATE.recurring.filter(r => {
    if (r.storeId !== storeId) return false;
    if (currentNames.has(r.name)) return false;
    const interval = r.interval === 'daily' ? 86400000 : r.interval === 'weekly' ? 604800000 : 2592000000;
    return !r.lastAdded || (now - r.lastAdded) >= interval;
  });
}

function checkRecurring() {
  // Auto-add overdue recurring items to lists
  const now = Date.now();
  for (const r of STATE.recurring) {
    if (!r.autoAdd) continue;
    const interval = r.interval==='daily' ? 86400000 : r.interval==='weekly' ? 604800000 : 2592000000;
    if (!r.lastAdded || (now - r.lastAdded) >= interval) {
      addItemTo(r.storeId, r.name);
      recurringRef.child(r.id).update({ lastAdded: now });
    }
  }
}

window.addRecurringItem = (recurringId, storeId, name) => {
  addItemTo(storeId, name);
  recurringRef.child(recurringId).update({ lastAdded: Date.now() });
};

//  GLOBAL SEARCH
// ══════════════════════════════════════════════════════════════
function globalSearch(q) {
  const resultsEl = document.getElementById('search-results');
  const clearBtn  = document.getElementById('search-clear');
  if (!q.trim()) { clearSearch(); return; }
  if (clearBtn) clearBtn.style.display = 'block';

  const results = [];
  for (const store of STATE.stores) {
    // Search in current list items
    const items = toArray((STATE.lists[store.id]||{}).items);
    for (const item of items) {
      if (item.name.includes(q)) {
        results.push({ type:'item', store, item });
      }
    }
    // Search in catalog
    for (const p of (store.catalog||[])) {
      if (p.includes(q) && !items.find(i=>i.name===p)) {
        results.push({ type:'catalog', store, name:p });
      }
    }
  }

  if (!resultsEl) return;
  if (!results.length) {
    resultsEl.innerHTML = `<div style="padding:14px 16px;color:var(--muted);font-size:13px;font-weight:600;text-align:center">לא נמצא "עגבניות"</div>`.replace('עגבניות', escHtml(q));
    resultsEl.classList.add('show');
    return;
  }

  resultsEl.innerHTML = results.slice(0,12).map(r => {
    if (r.type === 'item') {
      const done = r.item.done ? '✓ ' : '';
      return `<div class="search-result-item" onclick="jumpToStore('${r.store.id}')">
        <span style="font-size:18px">${r.store.emoji}</span>
        <div style="flex:1">
          <div class="search-result-name">${done}${escHtml(r.item.name)}</div>
          <div class="search-result-store">${escHtml(r.store.name)}</div>
        </div>
        <span class="search-result-badge" style="background:${r.store.color}">${r.item.done?'נרכש':'ברשימה'}</span>
      </div>`;
    } else {
      return `<div class="search-result-item" onclick="addItemTo('${r.store.id}','${escAttr(r.name)}');clearSearch()">
        <span style="font-size:18px">${r.store.emoji}</span>
        <div style="flex:1">
          <div class="search-result-name">+ ${escHtml(r.name)}</div>
          <div class="search-result-store">${escHtml(r.store.name)} · מאגר</div>
        </div>
        <span class="search-result-badge" style="background:${r.store.color}">הוסף</span>
      </div>`;
    }
  }).join('');
  resultsEl.classList.add('show');
}

function clearSearch() {
  const inp = document.getElementById('search-input');
  const resultsEl = document.getElementById('search-results');
  const clearBtn  = document.getElementById('search-clear');
  if (inp) inp.value = '';
  if (resultsEl) { resultsEl.innerHTML=''; resultsEl.classList.remove('show'); }
  if (clearBtn) clearBtn.style.display = 'none';
}

function jumpToStore(storeId) {
  clearSearch();
  openStores.add(storeId);
  const sec = document.getElementById('sec-'+storeId);
  const body = document.getElementById('body-'+storeId);
  if (sec) sec.classList.add('open');
  if (body && !body.innerHTML.trim()) {
    const store = STATE.stores.find(s=>s.id===storeId);
    const items = toArray((STATE.lists[storeId]||{}).items);
    if (store) body.innerHTML = renderStoreBody(store, items);
  }
  setTimeout(()=>{
    const el = document.getElementById('sec-'+storeId);
    if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }, 100);
}

// ══════════════════════════════════════════════════════════════
//  DRAG AND DROP (desktop + touch)
// ══════════════════════════════════════════════════════════════
//  DRAG & DROP (stores)
// ══════════════════════════════════════════════════════════════
let _storeDragId = null;

function storeDragStart(e, sid) {
  _storeDragId = sid;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', sid);
  setTimeout(() => document.getElementById('sec-'+sid)?.classList.add('store-dragging'), 10);
}
function storeDragOver(e, sid) {
  e.preventDefault();
  e.stopPropagation();
  if (!_storeDragId || _storeDragId === sid) return;
  document.querySelectorAll('.store-section').forEach(s => s.classList.remove('store-drag-over'));
  document.getElementById('sec-'+sid)?.classList.add('store-drag-over');
}
function storeDragLeave(e, sid) { document.getElementById('sec-'+sid)?.classList.remove('store-drag-over'); }
function storeDrop(e, targetId) {
  e.preventDefault();
  if (!_storeDragId || _storeDragId === targetId) return;
  const stores = [...STATE.stores];
  const fi = stores.findIndex(s=>s.id===_storeDragId);
  const ti = stores.findIndex(s=>s.id===targetId);
  if (fi<0||ti<0) return;
  stores.splice(ti, 0, stores.splice(fi,1)[0]);
  saveStores(stores);
  storeDragEnd();
}
function storeDragEnd() {
  document.querySelectorAll('.store-section').forEach(s => s.classList.remove('store-dragging','store-drag-over'));
  _storeDragId = null;
}

// Long-press on store header → delete
let _storeLongTimer = null;
function storeHeaderLongPress(e, sid) {
  _storeLongTimer = setTimeout(() => {
    _storeLongTimer = null;
    storeAskDelete(sid);
  }, 600);
}
function storeHeaderLongCancel() {

}
function storeAskDelete(sid) {

      ${items.length > 0 ? `<div style="font-size:13px;color:#e53e3e;font-weight:700;margin-bottom:16px">⚠️ יש ${items.length} פריטים ברשימה זו</div>` : '<div style="margin-bottom:16px"></div>'}
      <div style="display:flex;flex-direction:column;gap:8px">

        </button>

window.storeConfirmDelete = (sid) => {
  const newStores = STATE.stores.filter(s=>s.id!==sid);

  listsRef.child(sid).remove();
  openStores.delete(sid);

let _stTouchId=null, _stTouchEl=null;
function storeTouchStart(e,sid){ _stTouchId=sid; _stTouchEl=document.getElementById('sec-'+sid); e.stopPropagation(); }
function storeTouchMove(e){
  if(!_stTouchId)return; e.preventDefault();
  const t=e.touches[0], el=document.elementFromPoint(t.clientX,t.clientY)?.closest('.store-section');
  document.querySelectorAll('.store-section').forEach(s=>s.classList.remove('store-drag-over'));
  if(el && el.id!=='sec-'+_stTouchId){ el.classList.add('store-drag-over'); _stTouchEl?.classList.add('store-dragging'); }
}
function storeTouchEnd(e){
  if(!_stTouchId)return;
  const t=e.changedTouches[0], sec=document.elementFromPoint(t.clientX,t.clientY)?.closest('.store-section');
  const tid=sec?.id?.replace('sec-','');
  if(tid&&tid!==_stTouchId) storeDrop({preventDefault:()=>{}},tid);
  document.querySelectorAll('.store-section').forEach(s=>s.classList.remove('store-dragging','store-drag-over'));
  _stTouchId=null; _stTouchEl=null;
}

// ══════════════════════════════════════════════════════════════
let _dragId = null, _dragSid = null;
let _touchDragId = null, _touchDragSid = null;
let _touchClone = null, _touchStartY = 0;

function dragStart(e, id, sid) {
  _dragId = id; _dragSid = sid;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function dragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function dragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
}
function dragDrop(e, targetId, targetSid) {
  e.preventDefault();
  dragEnd(e);
  if (!_dragId || _dragSid !== targetSid || _dragId === targetId) return;
  const items = toArray((STATE.lists[_dragSid]||{}).items);
  const pending = items.filter(i=>!i.done);
  const done    = items.filter(i=>i.done);
  const fromIdx = pending.findIndex(i=>i.id===_dragId);
  const toIdx   = pending.findIndex(i=>i.id===targetId);
  if (fromIdx<0||toIdx<0) return;
  const reordered = [...pending];
  const [moved] = reordered.splice(fromIdx,1);
  reordered.splice(toIdx,0,moved);
  listsRef.child(_dragSid).child('items').set([...reordered, ...done]);
  _dragId=null; _dragSid=null;
}

// Touch drag support
function touchStart(e, id, sid) {
  if (e.target.classList.contains('drag-handle') ||
      e.target.closest('.drag-handle')) {
    _touchDragId = id; _touchDragSid = sid;
    _touchStartY = e.touches[0].clientY;
    const row = e.currentTarget;
    row.classList.add('dragging');
    // Clone for visual feedback
    _touchClone = row.cloneNode(true);
    _touchClone.style.cssText = `position:fixed;left:${row.getBoundingClientRect().left}px;top:${row.getBoundingClientRect().top}px;width:${row.offsetWidth}px;opacity:.85;pointer-events:none;z-index:999;transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,.2);border-radius:14px;`;
    document.body.appendChild(_touchClone);
  }
}
function touchMove(e) {
  if (!_touchDragId || !_touchClone) return;
  e.preventDefault();
  const dy = e.touches[0].clientY - _touchStartY;
  _touchClone.style.top = (parseFloat(_touchClone.style.top)+dy)+'px';
  _touchStartY = e.touches[0].clientY;
  // Highlight hovered row
  const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
  document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
  const targetRow = el?.closest('.item-row');
  if (targetRow) targetRow.classList.add('drag-over');
}
function touchEnd(e, sid) {
  if (!_touchDragId || !_touchClone) return;
  const touch = e.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const targetRow = el?.closest('[draggable]');

  _touchClone.remove(); _touchClone = null;
  document.querySelectorAll('.dragging,.drag-over').forEach(x=>{
    x.classList.remove('dragging','drag-over');
  });

  if (targetRow) {
    const targetId = targetRow.getAttribute('ondrop')?.match(/'([^']+)'/)?.[1];
    if (targetId && targetId !== _touchDragId) {
      const items = toArray((STATE.lists[sid]||{}).items);
      const pending = items.filter(i=>!i.done);
      const done = items.filter(i=>i.done);
      const fromIdx = pending.findIndex(i=>i.id===_touchDragId);
      const toIdx   = pending.findIndex(i=>i.id===targetId);
      if (fromIdx>=0 && toIdx>=0) {
        const reordered = [...pending];
        const [moved] = reordered.splice(fromIdx,1);
        reordered.splice(toIdx,0,moved);
        listsRef.child(sid).child('items').set([...reordered, ...done]);
      }
    }
  }
  _touchDragId=null; _touchDragSid=null;
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  if (!s) return '';
  return String(s).replace(/'/g,'\\x27').replace(/"/g,'\\x22');
}

const ROOM_KEY       = 'mkt-room-v1';
const SAVED_ROOMS_KEY = 'mkt-saved-rooms-v1';

function roomGet()  { return localStorage.getItem(ROOM_KEY) || ''; }
function roomSet(r) { localStorage.setItem(ROOM_KEY, r); }

function savedRoomsGet() {
  try { return JSON.parse(localStorage.getItem(SAVED_ROOMS_KEY) || '[]'); } catch { return []; }
}
function savedRoomsSave(rooms) {
  localStorage.setItem(SAVED_ROOMS_KEY, JSON.stringify(rooms));
}
function savedRoomsAdd(code, nickname, desc) {
  const rooms = savedRoomsGet().filter(r => r.code !== code);
  rooms.unshift({ code, nickname: nickname || code, desc: desc || '' });
  savedRoomsSave(rooms.slice(0, 10));
}
function savedRoomsRemove(code) {
  savedRoomsSave(savedRoomsGet().filter(r => r.code !== code));
}

function roomGenerate() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  document.getElementById('room-input').value = code;
}

function roomJoin() {
  const code = (document.getElementById('room-input')?.value||'').trim().toUpperCase();
  const err  = document.getElementById('room-err');
  if (!code || code.length < 3) { err.textContent = 'קוד חייב להיות לפחות 3 תווים'; return; }
  switchToRoom(code);
}

function switchToRoom(code, nickname) {
  roomSet(code);
  savedRoomsAdd(code, nickname);
  // Reset app state
  STATE = { stores: [], lists: {}, history: [], recurring: [] };
  openStores.clear(); openCatalogs.clear();
  // Detach old listeners
  if (db) {
    try { storesRef?.off(); listsRef?.off(); historyRef?.off(); recurringRef?.off(); } catch(e){}
  }
  document.getElementById('room-screen').style.display = 'none';
  document.getElementById('app').style.display = '';
  document.getElementById('stores-list').innerHTML = '<div class="empty-state"><div class="emoji">⏳</div><p>טוען...</p></div>';
  initFirebaseWithRoom(code);
  updateRoomBtnLabel(code);
}

  if (btn) btn.title = 'חדר: ' + code;
}

function initFirebaseWithRoom(roomCode) {
  if (!firebase.apps.length) {
    firebase.initializeApp(FIREBASE_CONFIG);
  }
  db = firebase.database();

  const base = 'rooms/' + roomCode;
  storesRef    = db.ref(base + '/stores');
  listsRef     = db.ref(base + '/lists');
  historyRef   = db.ref(base + '/history');
  recurringRef = db.ref(base + '/recurring');

  // Update footer and header
  const footer = document.getElementById('footer');
  if (footer) footer.innerHTML = `🏠 חדר: <strong>${roomCode}</strong> &nbsp;·&nbsp; 🟡 מסתנכרן בזמן אמת`;
  updateRoomBtnLabel(roomCode);

  // Ask for username, seed stores, start listeners
  setTimeout(() => { ensureUsername(); if (MY_NAME) setupPresence(); }, 800);

  const STORES_VERSION = "v3-2026";
  db.ref(base + '/storesVersion').once('value', snap => {
    if (snap.val() !== STORES_VERSION) {
      storesRef.set(DEFAULT_STORES);
      db.ref(base + '/storesVersion').set(STORES_VERSION);
    }
  });

  attachListeners();
  attachNotifListeners(roomCode);
}

function attachListeners() {
  storesRef.on('value', snap => {
    const val = snap.val();
    STATE.stores = val ? (Array.isArray(val) ? val : Object.values(val)) : DEFAULT_STORES;
    if (!activeStoreId || !STATE.stores.find(s=>s.id===activeStoreId)) {
      activeStoreId = STATE.stores[0]?.id;
    }
    renderHeader();
    renderAccordion();
    // Update counts immediately in case lists already loaded
    STATE.stores.forEach(s => {
      const cnt = document.getElementById('cnt-'+s.id);
      const allItems = toArray((STATE.lists[s.id]||{}).items);
      if (cnt) cnt.textContent = allItems.length > 0 ? allItems.length + ' פריטים' : '';
    });
  });
  listsRef.on('value', snap => {
    STATE.lists = snap.val() || {};
    renderHeader();
    // Refresh all open stores
    openStores.forEach(sid => {
      const store = STATE.stores.find(s=>s.id===sid);
      if (store) refreshBody(sid);
    });
    // Update badges + counts on all stores
    STATE.stores.forEach(s => {
      const cnt = document.getElementById('cnt-'+s.id);
      const allItems = toArray((STATE.lists[s.id]||{}).items);
      if (cnt) cnt.textContent = allItems.length > 0 ? allItems.length + ' פריטים' : '';
      const items   = toArray((STATE.lists[s.id]||{}).items);
      const pending = items.filter(i=>!i.done);
      const sec = document.getElementById('sec-'+s.id);
      if (!sec) return;
      const badge = sec.querySelector('.store-header-badge');
      if (pending.length > 0) {
        if (badge) badge.textContent = pending.length;
        else {
          const arrow = sec.querySelector('.store-header-arrow');
          if (arrow) {
            const b = document.createElement('span');
            b.className = 'store-header-badge';
            b.textContent = pending.length;
            sec.querySelector('.store-header').insertBefore(b, arrow);
          }
        }
      } else if (badge) badge.remove();
    });
  });
  historyRef.on('value', snap => {
    const val = snap.val();
    STATE.history = val ? Object.values(val) : [];
  });
  recurringRef.on('value', snap => {
    const val = snap.val();
    STATE.recurring = val ? Object.values(val) : [];
    checkRecurring();
  });
  db.ref('.info/connected').on('value', snap => {
    const dot = document.getElementById('sync-dot');
    if (dot) dot.classList.toggle('live', !!snap.val());
    if (snap.val() && MY_NAME) {
      setupPresence();
    }
  });
}

// ── Presence system ──
let _presenceRef = null;
function setupPresence() {
  if (!db || !MY_NAME) return;
  const roomCode = roomGet();
  if (!roomCode) return;

  const userId   = MY_NAME + '_' + (localStorage.getItem('mkt-uid') || (() => {
    const uid = Math.random().toString(36).slice(2,8);
    localStorage.setItem('mkt-uid', uid);
    return uid;
  })());
  _presenceRef = db.ref('rooms/' + roomCode + '/presence/' + userId);

  _presenceRef.set({ name: MY_NAME, at: Date.now(), online: true });
  _presenceRef.onDisconnect().remove();

  // Update timestamp every 2 min to show "active"
  setInterval(() => {
    if (MY_NAME) _presenceRef?.update({ at: Date.now() });
  }, 120000);

  // Listen to all users in this room
  db.ref('rooms/' + roomCode + '/presence').on('value', snap => {
    const val  = snap.val() || {};
    const now  = Date.now();
    const users = Object.values(val).filter(u => u.name);
    const bar  = document.getElementById('presence-bar');
    if (!bar) return;
    if (users.length === 0) { bar.innerHTML = ''; return; }
    bar.innerHTML = users.map(u => {
      const active = (now - (u.at||0)) < 300000; // active if seen in last 5 min
      const isMe   = u.name === MY_NAME;
      return `<div class="presence-chip">
        <div class="presence-dot${active?'':' away'}"></div>
        ${escHtml(u.name)}${isMe ? ' (אני)' : ''}
      </div>`;
    }).join('');
  });
}

const PIN_KEY      = 'mkt-pin-v1';
const PIN_UNLOCKED = 'mkt-unlocked-v1';
const DEFAULT_PIN  = '1234';

let _pinBuffer = '';

function pinGetCode()    { return localStorage.getItem(PIN_KEY) || DEFAULT_PIN; }
function pinIsUnlocked() {
  // Session unlock stored in sessionStorage (clears when browser/tab closed)
  return sessionStorage.getItem(PIN_UNLOCKED) === '1';
}

function pinInit() {
  if (pinIsUnlocked()) return; // already unlocked this session
  const screen = document.getElementById('pin-screen');
  if (screen) screen.style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// Called from roomInit after room is known
function showPinIfNeeded() {
  // PIN disabled — room code is the only protection needed
}

function pinPress(digit) {
  if (!digit) return;
  if (_pinBuffer.length >= 4) return;
  _pinBuffer += digit;
  pinUpdateDots();
  if (_pinBuffer.length === 4) {
    setTimeout(pinCheck, 120);
  }
}

function pinDel() {
  _pinBuffer = _pinBuffer.slice(0, -1);
  pinUpdateDots();
  document.getElementById('pin-error').textContent = '';
}

function pinUpdateDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('pd'+i);
    if (dot) dot.classList.toggle('filled', i < _pinBuffer.length);
  }
}

function pinCheck() {
  if (_pinBuffer === pinGetCode()) {
    sessionStorage.setItem(PIN_UNLOCKED, '1');
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = '';
    // Show "change PIN" link to admin (who knows the PIN)
    document.getElementById('pin-admin-link').style.display = 'block';
  } else {
    document.getElementById('pin-error').textContent = 'קוד שגוי, נסה שוב';
    _pinBuffer = '';
    pinUpdateDots();
    // Shake dots
    const dotsEl = document.getElementById('pin-dots');
    dotsEl.style.animation = 'none';
    dotsEl.style.transform = 'translateX(8px)';
    setTimeout(() => {
      dotsEl.style.transition = 'transform .4s ease';
      dotsEl.style.transform = 'translateX(0)';
    }, 50);
  }
}

//  IN-APP NOTIFICATIONS
// ══════════════════════════════════════════════════════════════
let _notifQueue = [];
let _notifShowing = false;

function showNotif(icon, msg) {
  _notifQueue.push({icon, msg});
  if (!_notifShowing) _flushNotif();
}

function _flushNotif() {
  if (!_notifQueue.length) { _notifShowing = false; return; }
  _notifShowing = true;
  const {icon, msg} = _notifQueue.shift();
  const banner = document.getElementById('notif-banner');
  if (!banner) { _notifShowing = false; return; }

  const el = document.createElement('div');
  el.className = 'notif-item';
  el.innerHTML = `<span class="notif-icon">${icon}</span><span>${escHtml(msg)}</span>`;
  banner.appendChild(el);

  requestAnimationFrame(() => {
    el.classList.add('show');
    setTimeout(() => {
      el.classList.add('hide');
      setTimeout(() => { el.remove(); _flushNotif(); }, 300);
    }, 3500);
  });
}

// ── Notification listeners (called after Firebase refs are set) ──
let _prevLists = {};
let _prevPresence = {};

function attachNotifListeners(roomCode) {
  // Items: detect add / toggle done
  listsRef.on('value', snap => {
    const newLists = snap.val() || {};
    // Skip first load
    if (Object.keys(_prevLists).length === 0) {
      _prevLists = JSON.parse(JSON.stringify(newLists));
      return;
    }
    STATE.stores.forEach(store => {
      const sid = store.id;
      const oldItems = Object.values((_prevLists[sid]||{}).items||{});
      const newItems = Object.values((newLists[sid]||{}).items||{});

      // Added items
      newItems.forEach(ni => {
        const wasPresent = oldItems.find(oi => oi.id === ni.id);
        if (!wasPresent && ni.addedBy && ni.addedBy !== MY_NAME) {
          showNotif('🛒', `${ni.addedBy} הוסיף "${ni.name}" ל${store.name}`);
        }
      });

      // Toggled to done
      newItems.forEach(ni => {
        if (!ni.done) return;
        const old = oldItems.find(oi => oi.id === ni.id);
        if (old && !old.done && ni.addedBy && ni.addedBy !== MY_NAME) {
          showNotif('✅', `${ni.addedBy} רכש "${ni.name}"`);
        }
      });
    });
    _prevLists = JSON.parse(JSON.stringify(newLists));
  });

  // Presence: detect new users joining
  db.ref('rooms/' + roomCode + '/presence').on('value', snap => {
    const val = snap.val() || {};
    Object.entries(val).forEach(([uid, u]) => {
      if (!u.name || u.name === MY_NAME) return;
      const wasHere = !!_prevPresence[uid];
      if (!wasHere) showNotif('👋', `${u.name} נכנס לחדר`);
    });
    // Detect disconnect
    Object.keys(_prevPresence).forEach(uid => {
      if (!val[uid] && _prevPresence[uid].name !== MY_NAME) {
        showNotif('👋', `${_prevPresence[uid].name} יצא`);
      }
    });
    _prevPresence = {...val};
  });
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2000);
}

// ── PWA Install prompt (Android) — let browser handle natively ──
window.addEventListener('beforeinstallprompt', e => {
  // Do NOT call e.preventDefault() — let browser show its own prompt immediately
  console.log('PWA installable');
});

// iOS install hint (shows once)
window.addEventListener('load', () => {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone;
  const dismissed = localStorage.getItem('ios-hint-dismissed');

  if (isIOS && !isStandalone && !dismissed) {
    setTimeout(() => {
      const hint = document.createElement('div');
      hint.innerHTML = `
        <div style="
          position:fixed;bottom:0;left:0;right:0;z-index:9999;
          background:#fff;border-top:2px solid #E8EAF0;
          padding:14px 16px 32px;
          box-shadow:0 -4px 20px rgba(60,70,120,.12);
          font-family:'Nunito',sans-serif;direction:rtl;
          text-align:center;
        ">
          <button onclick="this.closest('div').parentElement.remove();localStorage.setItem('ios-hint-dismissed','1')"
            style="position:absolute;top:10px;left:14px;background:none;border:none;color:#9298B0;font-size:22px;cursor:pointer">✕</button>
          <div style="font-size:28px;margin-bottom:6px">📲</div>
          <div style="font-size:14px;font-weight:800;color:#1A1D2E;margin-bottom:4px">הוסף לדף הבית</div>
          <div style="font-size:13px;color:#4A4F6A;font-weight:600;line-height:1.6">
            לחץ על <strong>⎋</strong> שיתוף<br>
            ואז <strong>"הוסף למסך הבית"</strong>
          </div>
        </div>`;
      document.body.appendChild(hint);
      setTimeout(() => hint.remove(), 8000);
    }, 2500);
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#2d6a4f">
<title>🛍️ רשימת קניות משפחתית</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ede5d5;
    --card: #fffdf9;
    --border: #e8e0d2;
    --text: #1a1209;
    --muted: #9a8e7e;
    --radius: 13px;
    --active-color: #2d6a4f;
  }
  html { height: 100%; }
  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    direction: rtl;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  input, button, select { font-family: 'Heebo', sans-serif; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
  button { cursor: pointer; transition: opacity .12s, transform .1s; }
  button:active { transform: scale(.96); }

  /* ── App Shell ── */
  #app { max-width: 520px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }

  /* ── Header ── */
  #header {
    background: var(--active-color);
    padding: 16px 14px 0;
    position: sticky; top: 0; z-index: 50;
    transition: background .3s ease;
  }
  .header-top {
    display: flex; align-items: flex-start;
    justify-content: space-between; margin-bottom: 14px; gap: 8px;
  }
  .header-title { color: #fff; font-size: 19px; font-weight: 900; line-height: 1.15; }
  .header-sub { color: rgba(255,255,255,.6); font-size: 12px; margin-top: 3px; }
  .header-actions { display: flex; gap: 5px; align-items: center; padding-top: 2px; flex-shrink: 0; }

  .hbtn {
    background: rgba(255,255,255,.15);
    border: 1.5px solid rgba(255,255,255,.28);
    color: #fff; border-radius: 8px;
    height: 30px; padding: 0 9px;
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; gap: 4px;
  }
  .hbtn.icon-only { width: 30px; padding: 0; justify-content: center; font-size: 14px; }

  /* sync dot */
  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,.35);
    transition: background .4s;
    flex-shrink: 0;
  }
  .sync-dot.live { background: #4ade80; }
  .sync-dot.saving { background: #facc15; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Tabs ── */
  .tabs {
    display: flex; gap: 3px;
    overflow-x: auto; scrollbar-width: none;
    padding-bottom: 0;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: rgba(255,255,255,.15);
    color: rgba(255,255,255,.88);
    border: none; border-radius: 9px 9px 0 0;
    padding: 7px 12px;
    font-size: 13px; font-weight: 700;
    white-space: nowrap; flex-shrink: 0;
    display: flex; align-items: center; gap: 5px;
    transition: background .2s, color .2s;
  }
  .tab-btn.active {
    background: var(--card);
    color: var(--active-color);
  }
  .tab-badge {
    background: rgba(255,255,255,.22);
    color: rgba(255,255,255,.95);
    border-radius: 9px; padding: 0 6px;
    font-size: 11px; font-weight: 800;
  }
  .tab-btn.active .tab-badge {
    background: var(--active-color);
    color: #fff;
    opacity: .2;
  }

  /* ── Content Card ── */
  #content {
    background: var(--card);
    border-radius: 0 0 18px 18px;
    padding: 14px 13px;
    box-shadow: 0 5px 20px rgba(0,0,0,.07);
    flex: 1;
  }

  /* ── Quick-Add ── */
  .quick-add {
    display: flex; gap: 7px; align-items: center;
    background: var(--bg); border-radius: var(--radius);
    padding: 9px 11px; margin-bottom: 10px;
    border: 1.5px solid var(--border);
  }
  .quick-add input {
    flex: 1; border: none; background: transparent;
    font-size: 15px; outline: none; direction: rtl; color: var(--text);
    min-width: 0;
  }
  .quick-add input::placeholder { color: #b0a898; }

  /* ── Buttons ── */
  .btn-primary {
    background: var(--active-color); color: #fff;
    border: none; border-radius: 9px;
    padding: 7px 13px; font-size: 14px; font-weight: 700;
    white-space: nowrap;
  }
  .btn-ghost {
    background: transparent; color: var(--active-color);
    border: 2px solid var(--active-color);
    border-radius: 9px; padding: 6px 9px;
    font-size: 13px; font-weight: 700;
    white-space: nowrap;
  }
  .btn-secondary {
    background: #f0ece4; color: #5a4e3a;
    border: none; border-radius: 9px;
    padding: 7px 14px; font-size: 14px; font-weight: 700;
  }
  .btn-danger {
    background: #fef2f2; color: #b91c1c;
    border: 1.5px solid #fca5a5;
    border-radius: 9px; padding: 7px 14px; font-size: 14px; font-weight: 700;
  }
  .btn-sm { padding: 4px 8px !important; font-size: 12px !important; }
  .btn-full { width: 100%; }
  button:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* ── Catalog Panel ── */
  .catalog-panel {
    background: #fff; border-radius: var(--radius);
    padding: 11px; margin-bottom: 10px;
    border: 1.5px solid var(--border);
    display: none;
  }
  .catalog-panel.open { display: block; }
  .catalog-search-row { display: flex; gap: 7px; margin-bottom: 9px; align-items: center; }
  .catalog-search-row input {
    flex: 1; border: 1.5px solid var(--border); border-radius: 9px;
    padding: 7px 10px; font-size: 13px; outline: none;
    direction: rtl; color: var(--text); background: #fff;
  }
  .catalog-chips {
    display: flex; flex-wrap: wrap; gap: 6px;
    max-height: 150px; overflow-y: auto;
  }
  .chip {
    border: none; border-radius: 18px; padding: 5px 12px;
    font-size: 13px; font-weight: 600;
    transition: background .12s, color .12s;
    white-space: nowrap;
  }

  /* ── Item List ── */
  .item-list { display: flex; flex-direction: column; gap: 5px; }
  .item-row {
    display: flex; align-items: center; gap: 9px;
    background: #fff; border: 1.5px solid var(--border);
    border-radius: 11px; padding: 8px 10px;
    transition: all .15s; cursor: pointer;
    -webkit-user-select: none; user-select: none;
  }
  .item-row.done {
    background: #f8f5f0;
    border-color: #ede6db;
  }

  .checkbox {
    width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
    border: 2px solid #ccc;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; background: transparent;
  }
  .checkbox.checked { border-color: var(--active-color); background: var(--active-color); }
  .checkbox svg { display: none; }
  .checkbox.checked svg { display: block; }

  .item-name {
    flex: 1; font-size: 15px; font-weight: 600; color: var(--text);
    transition: all .15s; pointer-events: none;
  }
  .item-row.done .item-name { text-decoration: line-through; color: #b0a898; }

  .qty-badge {
    border: none; border-radius: 8px;
    padding: 3px 9px; font-size: 12px; font-weight: 700;
    white-space: nowrap; flex-shrink: 0;
  }
  .del-btn {
    background: none; border: none; color: #d4c9b8;
    font-size: 19px; padding: 0 2px; line-height: 1;
    flex-shrink: 0;
  }
  .del-btn:hover { color: #ef4444; }

  /* Done section */
  .done-header {
    display: flex; align-items: center; justify-content: space-between;
    margin: 12px 0 5px;
  }
  .done-label { font-size: 11px; color: #bbb; font-weight: 700; letter-spacing: .5px; }
  .clear-btn { background: none; border: none; font-size: 12px; color: #c8a075; font-weight: 700; }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 36px 16px; color: #c0b4a0;
  }
  .empty-state .emoji { font-size: 44px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.52); z-index: 200;
    display: flex; align-items: flex-end; justify-content: center;
    padding: 0; animation: fadeIn .2s;
  }
  @media (min-height: 600px) {
    .modal-overlay { align-items: center; padding: 12px; }
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal-box {
    background: var(--card); border-radius: 20px 20px 0 0;
    width: 100%; max-width: 480px;
    max-height: 92dvh; overflow-y: auto;
    direction: rtl;
    box-shadow: 0 -8px 40px rgba(0,0,0,.2);
    animation: slideUp .25s ease-out;
  }
  @media (min-height: 600px) {
    .modal-box { border-radius: 20px; animation: popIn .2s ease-out; }
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  @keyframes popIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
  .modal-header {
    padding: 16px 18px 12px;
    border-bottom: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--card); z-index: 1;
    border-radius: 20px 20px 0 0;
  }
  .modal-title { font-size: 16px; font-weight: 800; color: var(--text); }
  .modal-close {
    background: #f0ece4; border: none; border-radius: 7px;
    width: 28px; height: 28px; font-size: 14px; color: #5a4e3a;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-body { padding: 14px 18px 24px; }

  /* ── Qty Modal ── */
  .qty-row { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; }
  .qty-row input {
    flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 8px; font-size: 22px; font-weight: 800;
    text-align: center; outline: none; color: var(--text);
  }
  .qty-stepper {
    width: 38px; height: 38px; border: none; border-radius: 9px;
    font-size: 20px; font-weight: 700; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .unit-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .unit-chip {
    border: none; border-radius: 18px; padding: 6px 13px;
    font-size: 13px; font-weight: 600;
  }

  /* ── Manage Stores ── */
  .store-row {
    display: flex; align-items: center; gap: 8px;
    background: #f9f6f0; border-radius: 11px;
    padding: 9px 11px; margin-bottom: 7px;
    border: 2px solid transparent;
  }
  .store-row-actions { display: flex; gap: 4px; }

  .edit-form {
    background: #fff8ee; border: 2px solid #f59e0b33;
    border-radius: 13px; padding: 13px; margin-top: 12px;
  }
  .edit-form-title { font-size: 13px; font-weight: 800; color: #92400e; margin-bottom: 10px; }
  .form-group { margin-bottom: 10px; }
  .form-label { font-size: 11px; font-weight: 700; color: #999; margin-bottom: 5px; display: block; }
  .form-input {
    width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 8px 11px; font-size: 14px; outline: none;
    direction: rtl; color: var(--text); background: #fff;
  }
  .emoji-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .emoji-option {
    font-size: 18px; background: #f0ece4; border: 2px solid transparent;
    border-radius: 7px; padding: 3px 5px;
  }
  .emoji-option.selected { background: #fef3c7; border-color: #f59e0b; }
  .color-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .color-option {
    width: 26px; height: 26px; border-radius: 50%;
    border: 3px solid transparent; cursor: pointer; outline: none;
  }
  .color-option.selected { border-color: #1a1209; }
  .add-store-btn {
    width: 100%; background: transparent;
    border: 2px dashed #d4c9b0; border-radius: 11px;
    padding: 10px; margin-top: 8px;
    font-size: 13px; font-weight: 700; color: #a09070;
  }

  /* ── History ── */
  .history-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .filter-btn {
    border: none; border-radius: 18px; padding: 5px 12px;
    font-size: 13px; font-weight: 700;
  }
  .history-item {
    display: flex; align-items: center; gap: 8px;
    background: #f9f6f0; border-radius: 10px;
    padding: 8px 11px; margin-bottom: 5px;
  }
  .history-name { flex: 1; font-size: 14px; font-weight: 600; }
  .history-qty {
    font-size: 12px; font-weight: 700; border-radius: 7px; padding: 2px 7px;
  }
  .history-date { font-size: 11px; color: #bbb; white-space: nowrap; }

  /* ── Setup Screen ── */
  #setup-screen {
    position: fixed; inset: 0; background: #fffdf9; z-index: 500;
    display: flex; align-items: center; justify-content: center;
    padding: 24px; direction: rtl;
  }
  .setup-box {
    max-width: 420px; width: 100%;
    background: #fff; border-radius: 20px; padding: 28px 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,.12);
  }
  .setup-logo { font-size: 48px; text-align: center; margin-bottom: 12px; }
  .setup-title { font-size: 22px; font-weight: 900; text-align: center; margin-bottom: 6px; }
  .setup-sub { font-size: 14px; color: #888; text-align: center; margin-bottom: 24px; line-height: 1.5; }
  .setup-steps { margin-bottom: 20px; }
  .setup-step {
    display: flex; gap: 12px; align-items: flex-start;
    margin-bottom: 16px;
  }
  .step-num {
    width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
    background: #1a1209; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; margin-top: 1px;
  }
  .step-text { font-size: 13px; line-height: 1.55; color: #333; }
  .step-text a { color: #1d4e89; font-weight: 700; }
  .step-text code {
    background: #f0ece4; padding: 1px 6px; border-radius: 5px;
    font-size: 12px; font-family: monospace;
  }
  .setup-input-group { margin-bottom: 12px; }
  .setup-label { font-size: 13px; font-weight: 700; margin-bottom: 6px; display: block; color: #444; }
  .setup-input {
    width: 100%; border: 2px solid #e0d9ce; border-radius: 10px;
    padding: 10px 12px; font-size: 14px; outline: none;
    direction: ltr; color: var(--text); background: #fff;
  }
  .setup-input:focus { border-color: #1d4e89; }
  #setup-error { color: #dc2626; font-size: 13px; margin-bottom: 10px; display: none; text-align: center; }
  .setup-footer { font-size: 12px; color: #bbb; text-align: center; margin-top: 12px; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #1a1209; color: #fff;
    padding: 10px 18px; border-radius: 20px;
    font-size: 13px; font-weight: 700;
    z-index: 1000; opacity: 0;
    transition: opacity .25s; pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* ── Footer ── */
  #footer {
    text-align: center; padding: 12px 16px 20px;
    color: #b8a88a; font-size: 11px; font-weight: 600;
  }

  /* ── Responsive tweak ── */
  @media (min-width: 480px) {
    #header { border-radius: 0 0 0 0; }
  }
</style>
</head>
<body>

<!-- ══ App ════════════════════════════════════════════════════════════════ -->
<div id="app">

  <!-- Header -->
  <div id="header">
    <div class="header-top">
      <div>
        <div class="header-title">🛍️ רשימת קניות</div>
        <div class="header-sub" id="header-sub">טוען...</div>
      </div>
      <div class="header-actions">
        <div class="sync-dot" id="sync-dot" title="סטטוס חיבור"></div>
        <button class="hbtn" onclick="openHistory()">📋</button>
        <button class="hbtn" onclick="openManageStores()">⚙️ חנויות</button>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <!-- Content -->
  <div id="content">
    <div class="empty-state"><div class="emoji">⏳</div><p>טוען...</p></div>
  </div>

  <div id="footer">🔴 חי — מסתנכרן בזמן אמת עם כל בני המשפחה</div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modals (rendered dynamically) -->
<div id="modal-root"></div>

let _renderPending = false;
function scheduleRender() {
  if (_renderPending) return;
  _renderPending = true;
  requestAnimationFrame(() => { _renderPending = false; renderAll(); });
}

async function initFirebase(cfg) {
  if (!firebase.apps.length) {
    firebase.initializeApp(cfg);
  }
  db = firebase.database();

  storesRef  = db.ref('stores');
  listsRef   = db.ref('lists');
  historyRef = db.ref('history');

  // Seed/update stores based on version
  const STORES_VERSION = "v3-2026";
  db.ref('storesVersion').once('value', snap => {
    if (snap.val() !== STORES_VERSION) {
      storesRef.set(DEFAULT_STORES);
      db.ref('storesVersion').set(STORES_VERSION);
    }
  });

  // Real-time listeners
  storesRef.on('value', snap => {
    STATE.stores = snap.val() || DEFAULT_STORES;
    if (!activeStoreId || !STATE.stores.find(s=>s.id===activeStoreId)) {
      activeStoreId = STATE.stores[0]?.id;
    }
    scheduleRender();
  });
  listsRef.on('value', snap => {
    const newLists = snap.val() || {};
    const newJSON = JSON.stringify(newLists[activeStoreId]);
    const changed = newJSON !== JSON.stringify(STATE.lists[activeStoreId]);
    STATE.lists = newLists;
    if (changed) scheduleRender();
  });
  historyRef.on('value', snap => {
    STATE.history = snap.val() ? Object.values(snap.val()) : [];
  });

  // Connection indicator
  db.ref('.info/connected').on('value', snap => {
    const dot = document.getElementById('sync-dot');
    if (dot) dot.classList.toggle('live', !!snap.val());
  });
}

function activeStore() { return STATE.stores.find(s=>s.id===activeStoreId)||STATE.stores[0]; }
function activeItems() { return (STATE.lists[activeStoreId]||{}).items || []; }

function addItem(name) {
  const items = activeItems();
  if (items.find(i=>i.name===name)) { toast('כבר ברשימה ✓'); return; }
  const newItem = { id: 'i'+Date.now(), name, done: false, qty: null, unit: null };
  const newItems = [...items, newItem];
  listsRef.child(activeStoreId).child('items').set(newItems);
}

function toggleItem(id) {
  const items = activeItems();
  const item  = items.find(i=>i.id===id);
  if (!item) return;
  if (!item.done) {
    // Record in history
    const hEntry = { name:item.name, storeId:activeStoreId, qty:item.qty, unit:item.unit, at: Date.now() };
    historyRef.push(hEntry);
  }
  const updated = items.map(i=> i.id===id ? {...i, done:!i.done} : i);
  listsRef.child(activeStoreId).child('items').set(updated);
}

function removeItem(id) {
  const updated = activeItems().filter(i=>i.id!==id);
  listsRef.child(activeStoreId).child('items').set(updated);
}

function clearDone() {
  const updated = activeItems().filter(i=>!i.done);
  listsRef.child(activeStoreId).child('items').set(updated);
  closeModal();
}

function updateQty(id, qty, unit) {
  const updated = activeItems().map(i=> i.id===id ? {...i, qty, unit} : i);
  listsRef.child(activeStoreId).child('items').set(updated);
}

function saveStores(stores) { storesRef.set(stores); }
function saveCatalog(storeId, catalog) {
  const stores = STATE.stores.map(s=> s.id===storeId ? {...s, catalog} : s);
  storesRef.set(stores);
}

function renderAll() {
  renderHeader();

function renderHeader() {
  const store = activeStore();
  if (!store) return;
  document.getElementById('header').style.background = store.color;
  document.querySelector('meta[name="theme-color"]').content = store.color;

  const totalPending = STATE.stores.reduce((s,st)=> {
    return s + ((STATE.lists[st.id]||{}).items||[]).filter(i=>!i.done).length;
  }, 0);
  const isTask = activeStore()?.isTaskList;
  const sub = document.getElementById('header-sub');
  if (sub) {
    if (isTask) {
      const taskPending = activeItems().filter(i=>!i.done).length;
      sub.textContent = taskPending > 0 ? `${taskPending} משימות פתוחות` : 'כל המשימות הושלמו! 🎉';
    } else {
      sub.textContent = totalPending > 0 ? `${totalPending} מוצרים לרכישה` : 'הכל נרכש! 🎉';
    }
  }
}

function renderTabs() {
  const el = document.getElementById('tabs');
  if (!el) return;
  el.innerHTML = STATE.stores.map(s => {
    const cnt = ((STATE.lists[s.id]||{}).items||[]).filter(i=>!i.done).length;
    const act = s.id === activeStoreId;
    return `<button class="tab-btn${act?' active':''}" onclick="switchTab('${s.id}')">
      <span>${s.emoji}</span>
      <span>${s.name}</span>
      ${cnt>0?`<span class="tab-badge">${cnt}</span>`:''}
    </button>`;
  }).join('');
}

  const pending = items.filter(i=>!i.done);
  const done    = items.filter(i=>i.done);

  const catalog = store.catalog || [];

  const chips   = catalog.filter(p=> p.includes(catalogQuery) && !names.has(p));

  const lightBg = c+'14';
  const lightBorder = c+'2a';

  let html = `
  <!-- Quick add -->
  <div class="quick-add" style="border-color:${c}22">
    <input id="quick-input" type="text" placeholder="הוסף מוצר..."
      onkeydown="if(event.key==='Enter'){addFromInput()}"

        style="border-color:${c}44">
      <button class="btn-ghost btn-sm" style="border-color:${c};color:${c}"
        onclick="openManageCatalog('${store.id}')">✏️ ערוך</button>
    </div>
    <div class="catalog-chips">
      ${chips.map(p=>`
        <button class="chip" style="background:${lightBg};color:${c};border:1.5px solid ${lightBorder}"
          onclick="addItem('${escAttr(p)}')"
          onmouseenter="this.style.background='${c}';this.style.color='#fff'"
          onmouseleave="this.style.background='${lightBg}';this.style.color='${c}'">
          + ${escHtml(p)}

      ${chips.length===0?`<span style="color:#bbb;font-size:13px">${catalogQuery?'לא נמצא':'כל המוצרים ברשימה ✓'}</span>`:''}

  // Item list
  if (items.length === 0) {

      <div class="emoji">${store.emoji}</div>

function renderTaskItem(item, store) {

let modalStack = [];

function openModal(html, title) {
  const root = document.getElementById('modal-root');
  const id   = 'modal-'+Date.now();
  root.innerHTML = `
  <div class="modal-overlay" id="${id}" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 class="modal-title">${title}</h2>

function closeModal() {

// ── Qty Editor ──
function openQtyEditor(itemId) {
  const item  = activeItems().find(i=>i.id===itemId);
  const store = activeStore();
  if (!item) return;
  const qty  = item.qty  || 1;
  const unit = item.unit || "יח'";
  const c = store.color;

  openModal(`
  <div class="qty-row">
    <button class="qty-stepper btn-secondary" onclick="qtyStep(-1)">−</button>
    <input type="number" id="qty-val" value="${qty}" min="1"
      style="border:1.5px solid #e0d9ce;border-radius:10px;padding:8px;font-size:22px;font-weight:800;text-align:center;outline:none;flex:1;color:#1a1209">
    <button class="qty-stepper" style="background:${c};color:#fff;border:none;border-radius:9px;width:38px;height:38px;font-size:20px;font-weight:700;flex-shrink:0" onclick="qtyStep(1)">+</button>
  </div>
  <div class="unit-chips">
    ${UNITS.map(u=>`
      <button class="unit-chip" id="unit-${u.replace(/['"]/g,'')}"
        style="background:${unit===u?c:'#f0ece4'};color:${unit===u?'#fff':'#5a4e3a'};border:none;border-radius:18px;padding:6px 13px;font-size:13px;font-weight:600"
        onclick="selectUnit('${escAttr(u)}','${escAttr(c)}')">${escHtml(u)}</button>`).join('')}
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn-primary btn-full" style="background:${c}" onclick="saveQty('${itemId}')">שמור</button>
    <button class="btn-secondary" onclick="closeModal()">ביטול</button>
  </div>`, `🔢 כמות — ${escHtml(item.name)}`);
}

function qtyStep(d) {
  const inp = document.getElementById('qty-val');
  if (inp) inp.value = Math.max(1, parseInt(inp.value)||1) + d;
}

let _selectedUnit = null;
function selectUnit(u, c) {
  _selectedUnit = u;
  document.querySelectorAll('.unit-chip').forEach(el => {
    const isThis = el.textContent.trim() === u;
    el.style.background = isThis ? c : '#f0ece4';
    el.style.color = isThis ? '#fff' : '#5a4e3a';
  });
}
function saveQty(itemId) {
  const inp = document.getElementById('qty-val');
  const qty = Math.max(1, parseInt(inp?.value)||1);
  const unit = _selectedUnit || document.querySelector('.unit-chip[style*="color: rgb"]')?.textContent.trim() || "יח'";
  updateQty(itemId, qty, unit);
  closeModal();
  _selectedUnit = null;
}

// ── History ──
function openHistory() {
  let filterStore = 'all';

  const renderHistoryBody = () => {
    const hist   = [...STATE.history].sort((a,b)=>(b.at||0)-(a.at||0));
    const filter = filterStore;
    const shown  = filter==='all' ? hist : hist.filter(h=>h.storeId===filter);

    const filters = `<div class="history-filters">
      <button class="filter-btn" style="background:${filterStore==='all'?'#1a1209':'#f0ece4'};color:${filterStore==='all'?'#fff':'#5a4e3a'}"
        onclick="histFilter('all')">הכל</button>
      ${STATE.stores.map(s=>`
        <button class="filter-btn"
          style="background:${filter===s.id?s.color:'#f0ece4'};color:${filter===s.id?'#fff':'#5a4e3a'}"
          onclick="histFilter('${s.id}')">${s.emoji} ${escHtml(s.name)}</button>`).join('')}
    </div>`;

    const items = shown.slice(0,150).map(h=>{
      const store = STATE.stores.find(s=>s.id===h.storeId);
      const d = new Date(h.at);
      const dateStr = d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit'})
                    + ' ' + d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
      return `<div class="history-item">
        <span>${store?.emoji||'🛍️'}</span>
        <span class="history-name">${escHtml(h.name)}</span>
        ${h.qty?`<span class="history-qty" style="background:${store?.color||'#888'}18;color:${store?.color||'#888'}">${h.qty} ${h.unit||''}</span>`:''}
        <span class="history-date">${dateStr}</span>
      </div>`;
    }).join('');

    return filters + (shown.length===0
      ? `<div style="text-align:center;padding:24px 0;color:#bbb;font-size:14px">אין היסטוריה עדיין</div>`
      : `<div>${items}</div>`);
  };

  window.histFilter = (id) => {
    filterStore = id;
    const body = document.querySelector('.modal-body');
    if (body) body.innerHTML = renderHistoryBody();
  };

  openModal(renderHistoryBody(), '📋 היסטוריית קניות');
}

window.storeEdit = (id) => {
  const s = STATE.stores.find(x=>x.id===id);
  if (!s) return;
  _editingStoreId = id;
  _editForm = { name:s.name, emoji:s.emoji, color:s.color };
  renderManageStores();
};
window.storeNew = () => {
  _editingStoreId = 'new';
  _editForm = { name:'', emoji:'🛍️', color:'#374151' };
  renderManageStores();
};
window.storeCancelEdit = () => { _editingStoreId=null; renderManageStores(); };
window.efSetEmoji = (e) => { _editForm.emoji=e; renderManageStores(); };
window.efSetColor = (c) => { _editForm.color=c; renderManageStores(); };
window.storeMove = (i, dir) => {
  const stores = [...STATE.stores];
  const j = i+dir;
  if (j<0||j>=stores.length) return;
  [stores[i],stores[j]]=[stores[j],stores[i]];
  saveStores(stores);
};
window.storeDelete = (id) => {
  if (STATE.stores.length<=1) return;
  saveStores(STATE.stores.filter(s=>s.id!==id));
  if (activeStoreId===id) activeStoreId=STATE.stores[0]?.id;
  renderManageStores();
};
window.storeSave = () => {
  const f = _editForm;
  if (!f.name?.trim()) { toast('הזן שם לחנות'); return; }
  let stores;
  if (_editingStoreId==='new') {
    stores = [...STATE.stores, { id:'s_'+Date.now(), name:f.name.trim(), emoji:f.emoji, color:f.color, catalog:[] }];
  } else {
    stores = STATE.stores.map(s=> s.id===_editingStoreId ? {...s, name:f.name.trim(), emoji:f.emoji, color:f.color} : s);
  }
  saveStores(stores);
  _editingStoreId=null;
  renderManageStores();
};

// ── Manage Catalog ──
function openManageCatalog(storeId) {
  const store = STATE.stores.find(s=>s.id===storeId);
  if (!store) return;
  let catalog = [...(store.catalog||[])];
  let catInput = '';

  const render = () => {
    openModal(`
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input type="text" id="cat-input" value="${escHtml(catInput)}"
        placeholder="הוסף מוצר למאגר..."
        style="flex:1;border:1.5px solid #e0d9ce;border-radius:10px;padding:8px 11px;font-size:14px;outline:none;direction:rtl;color:#1a1209"
        oninput="catInput=this.value"
        onkeydown="if(event.key==='Enter'){catAdd()}">
      <button class="btn-primary" style="background:${store.color}" onclick="catAdd()">הוסף</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;max-height:300px;overflow-y:auto;margin-bottom:14px">
      ${catalog.map(item=>`
        <div style="display:flex;align-items:center;gap:4px;background:${store.color}15;border:1.5px solid ${store.color}2a;border-radius:18px;padding:4px 8px 4px 10px">
          <span style="font-size:13px;font-weight:600;color:${store.color}">${escHtml(item)}</span>
          <button onclick="catRemove('${escAttr(item)}')" style="background:none;border:none;cursor:pointer;color:${store.color}77;font-size:14px;padding:0;line-height:1">×</button>
        </div>`).join('')}
      ${catalog.length===0?`<span style="color:#bbb;font-size:13px">המאגר ריק</span>`:''}
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-primary btn-full" style="background:${store.color}" onclick="catSave()">✓ שמור</button>
      <button class="btn-secondary" onclick="closeModal()">ביטול</button>
    </div>`, `${store.emoji} מאגר — ${escHtml(store.name)}`);
    const ci = document.getElementById('cat-input');
    if (ci) ci.focus();
  };

  window.catInput = '';
  window.catAdd = () => {
    const t = (document.getElementById('cat-input')?.value||'').trim();
    if (!t||catalog.includes(t)) return;
    catalog.push(t); window.catInput=''; render();
  };
  window.catRemove = (item) => { catalog=catalog.filter(i=>i!==item); render(); };
  window.catSave   = () => { saveCatalog(storeId, catalog); closeModal(); toast('המאגר עודכן ✓'); };

  render();
}

// shortcut
window.openManageCatalog = openManageCatalog;
window.openManageStores  = openManageStores;

// ══════════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════════
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  if (!s) return '';
  return String(s).replace(/'/g,'\\x27').replace(/"/g,'\\x22');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2000);
}
</script>
